services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opsmind
      POSTGRES_PASSWORD: opsmind
      POSTGRES_DB: opsmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://opsmind:opsmind@db:5432/opsmind
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
