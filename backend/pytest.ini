[pytest]
# Tells pytest exactly where tests live, instead of relying on it to walk
# the whole project root and lean on its own default exclusions (.venv,
# venv, node_modules, etc.) to avoid collecting anything else. Explicit
# here for the same reason Settings (core/config.py) is a typed class
# instead of ad hoc os.environ.get() calls: a piece of environment
# configuration should say exactly what it means, not depend on an
# undocumented default silently doing the right thing.
testpaths = tests
